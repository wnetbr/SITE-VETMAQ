<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção Técnica | VETMAQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --stihl-orange: #FF6600;
            --stihl-grey-dark: #212121;
            --stihl-grey-medium: #444444;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--stihl-grey-dark);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fundo com textura de oficina */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(33, 33, 33, 0.9), rgba(33, 33, 33, 0.9)),
                        url('https://www.stihl.com.br/content/dam/stihl/media/pim/117454.jpg'); /* Imagem de fundo técnica */
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: grayscale(100%);
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            border-top: 6px solid var(--stihl-orange);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .logo span { color: var(--stihl-orange); }

        .icon-box {
            margin: 20px 0;
            position: relative;
            display: inline-block;
        }

        /* Animação de Engrenagem */
        .gear {
            font-size: 50px;
            display: inline-block;
            animation: rotate 4s linear infinite;
            color: var(--stihl-orange);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 1.8rem; margin: 10px 0; text-transform: uppercase; }
        p { color: #ccc; line-height: 1.6; font-size: 1.1rem; }

        .status-bar {
            width: 100%;
            height: 4px;
            background: #333;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        .status-progress {
            position: absolute;
            height: 100%;
            width: 50%;
            background: var(--stihl-orange);
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        .btn-whatsapp {
            display: inline-block;
            background: var(--stihl-orange);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-whatsapp:hover {
            background: #e65c00;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,102,0,0.3);
        }

        .countdown {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--stihl-orange);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="logo">VET<span>MAQ</span></div>
    <div class="icon-box">
        <div class="gear">⚙️</div>
    </div>
    <h1>Manutenção</h1>
    <p>Estamos ajustando nossas ferramentas digitais para lhe atender melhor. Voltamos em instantes com toda a linha STIHL atualizada.</p>
    
    <div class="status-bar">
        <div class="status-progress"></div>
    </div>

    <p style="font-size: 0.9rem;">Precisa de atendimento urgente?</p>
    <a href="https://wa.me/5597981107634" class="btn-whatsapp">Falar com Consultor Técnico</a>

    <div class="countdown" id="timer">Previsão de retorno: 72 horas</div>
</div>

<script>
    // Script simples para mostrar a hora atualizada ou mensagem dinâmica
    const timerElement = document.getElementById('timer');
    const voltaAs = new Date();
    voltaAs.setHours(voltaAs.getHours() + 2);

    // Opcional: Atualizar texto dinamicamente
    console.log("Modo manutenção ativo desde: " + new Date().toLocaleString());
</script>

</body>
</html>
